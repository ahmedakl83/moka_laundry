name: moka
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  camera: ^0.11.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpeg
